openapi: 3.0.3
info:
  title: Product Service API
  version: 1.0.0
  description: API for retrieving product data.
servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    description: API Gateway base URL
    variables:
      apiId:
        default: your-api-id
      region:
        default: us-east-1
      stage:
        default: prod
paths:
  /products:
    get:
      summary: Get all products
      operationId: getProductsList
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsListResponse"
  /products/{productId}:
    get:
      summary: Get product by id
      operationId: getProductsById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
      required:
        - title
        - price
    ProductsListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        count:
          type: integer
      required:
        - success
        - data
        - count
    ProductResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Product"
      required:
        - success
        - data
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
